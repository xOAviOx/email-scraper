<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LeadHarvest{% endblock %}</title>
  <style>
    :root { --ink:#1f2937; --line:#e5e7eb; --brand:#1f4e78; --bg:#f8fafc; }
    * { box-sizing: border-box; }
    body { margin:0; font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
           color:var(--ink); background:var(--bg); }
    header { background:var(--brand); color:#fff; padding:14px 22px; display:flex;
             align-items:center; justify-content:space-between; }
    header a { color:#fff; text-decoration:none; }
    header .brand { font-weight:700; letter-spacing:.3px; }
    main { max-width:880px; margin:28px auto; padding:0 18px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:10px;
            padding:20px; margin-bottom:18px; }
    h1,h2 { color:var(--brand); }
    label { display:block; font-weight:600; margin:12px 0 4px; }
    input, button { font:inherit; }
    input[type=text],input[type=email],input[type=password],input[type=number] {
      width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:7px; }
    button { background:var(--brand); color:#fff; border:0; border-radius:7px;
             padding:10px 16px; cursor:pointer; font-weight:600; }
    button.ghost { background:transparent; color:var(--brand); border:1px solid var(--brand); }
    button:disabled { opacity:.5; cursor:not-allowed; }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:9px 8px; border-bottom:1px solid var(--line); font-size:14px; }
    .pill { display:inline-block; padding:2px 9px; border-radius:999px; font-size:12px; font-weight:600; }
    .queued{background:#fef3c7;color:#92400e}.running{background:#dbeafe;color:#1e40af}
    .done{background:#dcfce7;color:#166534}.failed{background:#fee2e2;color:#991b1b}
    .muted{color:#6b7280;font-size:13px}
    .err{background:#fee2e2;color:#991b1b;padding:10px 12px;border-radius:7px;margin-bottom:14px}
    .quota{font-size:28px;font-weight:700;color:var(--brand)}
    .dl a{color:var(--brand);text-decoration:none;margin-right:10px;font-weight:600;font-size:13px}
  </style>
</head>
<body>
  <header>
    <a class="brand" href="/">🌾 LeadHarvest</a>
    {% block nav %}{% endblock %}
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
